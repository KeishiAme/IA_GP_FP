<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Inter, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(white, #00D0FF);
    }

    .card {
      background: rgba(255, 255, 255, 0.6);
      padding: 40px 30px;
      border-radius: 20px;
      width: 350px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      color: #0099cc;
      margin-bottom: 10px;
    }

    p {
      color: #333;
      margin-bottom: 25px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #00D0FF;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00b8e6;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Welcome!</h1>
    <p>You have logged in successfully.</p>

    <button>Continue</button>
  </div>

</body>
<script>

async function checkUser() {

    const { data: { session } } =
    await _supabase.auth.getSession();

    if (!session) {
        window.location.href = "login.html";
    }
}

checkUser();

</script>
</html>
