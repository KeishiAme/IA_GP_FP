<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify OTP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js" defer></script>
<style>
* { box-sizing: border-box; }
body {font-family: Inter; display:flex; justify-content:center; align-items:center; height:100vh; background:linear-gradient(white,#00D0FF);}
.card {background:rgba(255,255,255,0.6); padding:30px; border-radius:20px; width:320px; text-align:center;}
input, button {width:100%; padding:12px; margin:8px 0; border-radius:8px; border: 1px solid #ccc;}
button {background:#00D0FF; color:white; border:none; cursor: pointer;}
</style>
</head>

<body>
<div class="card">
<h2>OTP Phone Verification</h2>
<p style="font-size: 14px; color: #555;">Enter your registered phone number and the SMS code sent to your device.</p>
<input type="tel" id="otpPhone" placeholder="Phone Number (e.g., +639...)">
<input type="text" id="otpCode" placeholder="6-Digit Verification Code">
<button onclick="confirmOtp()">Verify Code</button>
<p><a href="login.html">Cancel and Return</a></p>
</div>
</body>

</html>
