<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js" defer></script>
<script>
const { data: { session } } =
    await _supabase.auth.getSession();

if (session) {
    window.location.replace("./dashboard.html");
}
</script>
<style>
* { box-sizing: border-box; }
body {font-family: Inter; display:flex; justify-content:center; align-items:center; height:100vh; background:linear-gradient(white,#00D0FF);}
.card {background:rgba(255,255,255,0.6); padding:30px; border-radius:20px; width:300px; text-align:center;}
input, button {width:100%; padding:12px; margin:8px 0; border-radius:8px; border: 1px solid #ccc;}
button {background:#00D0FF; color:white; border:none; cursor: pointer;}
a {font-size:14px;}
</style>
</head>
<body>
<div class="card">
<h2>Login</h2>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">
<div style="text-align:right;"><a href="forgot.html">Forgot Password?</a></div>
<button onclick="loginUser()">Log In</button>
<button onclick="loginWithGoogle()" style="background:#4285F4; margin-top:5px;">Login with Google</button>
<p>Don't have an account? <a href="signup.html">Sign Up</a></p>
</div>
</body>
</html>
